AllCops:
  TargetRubyVersion: 2.7
  NewCops: enable

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/Documentation:
  Enabled: false

Metrics/ClassLength:
  Exclude:
    - "lib/udiff/diff.rb"

Metrics/MethodLength:
  Exclude:
    - "lib/udiff/diff.rb"
    - "spec/**/*"

Metrics/AbcSize:
  Exclude:
    - "lib/udiff/diff.rb"
    - "spec/**/*"

Metrics/CyclomaticComplexity:
  Exclude:
    - "lib/udiff/diff.rb"

Metrics/PerceivedComplexity:
  Exclude:
    - "lib/udiff/diff.rb"

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "lib/udiff/diff.rb"

Naming/MethodParameterName:
  Exclude:
    - "lib/udiff/diff.rb"
